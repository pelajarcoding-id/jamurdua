name: deploy
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sarakan-app:latest
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_TOKEN }}"
            cd /opt/sarakan-app
            git fetch --all || true
            if [ ! -d .git ]; then
              sudo rm -rf .
              git clone --depth=1 ${{ github.server_url }}/${{ github.repository }} .
            else
              git pull
            fi
            cp .env.prod .env || true
            sed -i 's|ghcr.io/.\\+|ghcr.io/${{ github.repository_owner }}/sarakan-app:latest|g' docker-compose.yml || true
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
