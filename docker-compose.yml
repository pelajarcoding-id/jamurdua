version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.prod
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      - db
    restart: unless-stopped
    command: sh -c "npm run prisma:deploy && npm run start"
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata:
  uploads_data:
